# Annex IV.1 — System Description (EU AI Act)
# Provider: NovaMed Robotics | System: SpineGuard AI v1.0
# Loaded by compliance_suite.py → venturalitica.models.SystemDescription
#
# Reference: Art. 11 + Annex IV, Section 1 (Technical Documentation)
# Subsections (a)–(h) + foreseeable misuse per Art. 9(2)(b)

name: "SpineGuard AI"
version: "1.0.0"
provider_name: "NovaMed Robotics GmbH"

# (a) Intended purpose & general description
intended_purpose: >
  AI-assisted pre-operative planning for spinal metastasis segmentation
  in CT scans. Classified as MDR Class IIb medical device (software as
  a medical device — SaMD) under EU AI Act Art. 6(1) high-risk category
  (Annex I, Section A, Rule 11). Intended for use by board-certified
  radiologists and spine surgeons in hospital settings to delineate
  vertebral and paraspinal metastases for radiation therapy planning
  and surgical approach assessment. Target population: adult patients
  (18+) with confirmed or suspected spinal metastatic disease.
  Clinical validation under multi-center IRB-approved protocol
  (N=612 patients, 2,480 vertebral segments across 3 institutions).

# (b) Interaction with hardware and software
interaction_description: >
  Integrates with hospital PACS via DICOM C-STORE SCP/SCU and DICOMweb
  (WADO-RS, STOW-RS). Receives CT volumes, processes through SegResNet
  (3D, 105-channel) sliding-window inference pipeline. Returns
  segmentation as DICOM SEG objects or RT Structure Sets for direct
  import into treatment planning systems. Operates as a backend
  service within the clinical IT environment (hospital DMZ,
  VLAN-isolated). No direct patient interaction.

# (c) Software dependencies and versions
software_dependencies: >
  Runtime: Python 3.11.8, PyTorch 2.2.1 (CUDA 12.1), MONAI 1.3.1,
  MONAI Deploy 0.6. Model architecture: SegResNet (spatial_dims=3,
  in_channels=1, out_channels=105, init_filters=32,
  blocks_down=[1,2,2,4], blocks_up=[1,1,1]). Inference: sliding window
  (96x96x96 patches, 0.25 overlap, Gaussian importance weighting,
  test-time augmentation with 4-fold axis flips). Pre-processing:
  MONAI transforms (Spacing 1.0x1.0x1.0mm, ScaleIntensityRange
  HU[-200,1500]→[0,1], CropForeground). Post-processing: connected
  component analysis, vertebral labeling via centroid detection +
  anatomical atlas (T1-L5-S1). DICOM I/O: pydicom 2.4.4,
  highdicom 0.22.0. Orchestration and compliance: Venturalitica
  SDK 0.5.3. Container base: Ubuntu 22.04 LTS. Dependency SBOM:
  CycloneDX 1.5 ML profile (auto-generated per build).

# (d) Market placement form
market_placement_form: >
  On-premises deployment as signed OCI container image within hospital
  DMZ infrastructure. No cloud processing of patient data — full
  air-gap capable. Model weights distributed via signed OCI artifacts
  with SLSA Level 3 provenance attestation. Licensing: per-site
  annual subscription with CE-marked software release cycle (quarterly
  updates, hotfixes within 72h SLA). Distribution through authorized
  medical device distributors with mandatory on-site installation
  and clinical validation by NovaMed field service engineers.

# (e) Hardware requirements
hardware_description: >
  Minimum compute: NVIDIA CUDA-capable GPU with >= 8 GB VRAM
  (inference) or >= 24 GB VRAM (with test-time augmentation).
  Validated on: NVIDIA A100 40GB (data center, reference),
  RTX 4090 24GB (workstation), T4 16GB (cloud inference —
  planning-only mode). Host: 64-bit x86_64, minimum 32 GB RAM,
  NVMe SSD with >= 500 GB (DICOM staging + model cache). Network:
  DICOM receiver on port 11112, TLS 1.3 required for PHI transfer
  (IHE ATNA compliant). Environmental: operating temperature 18-26°C.

# (f) External features and visual interface elements
external_features: >
  Web-based review UI for radiologists (OHIF Viewer v3 integration
  with custom SpineGuard plugin). Visual features: (1) 3D volumetric
  rendering with adjustable bone/soft-tissue opacity and metastasis
  color-coding, (2) multi-planar reconstruction (axial/sagittal/
  coronal) with AI overlay toggle, (3) vertebral labels (C1-S5) with
  per-vertebra Dice confidence score and uncertainty heatmap,
  (4) 3D segmentation mesh export (STL) for surgical planning,
  (5) PDF/DICOM SR structured report with measurement annotations
  and tumor volume quantification.

# (g) User interface description
ui_description: >
  Clinician dashboard: patient worklist with AI processing status
  (queued → processing → review required → approved → locked).
  Case viewer: synchronized multi-planar display with AI segmentation
  overlay, adjustable transparency slider, and manual contour editing
  tools (brush, smart scissors, region grow). 3D spine visualization
  with clickable vertebral bodies showing per-level metrics (Dice
  score, tumor volume mL, vertebral body involvement %).
  Audit panel: complete modification history with timestamped entries,
  user identity (hospital AD/LDAP SSO), and reason-for-edit dropdowns
  (clinical disagreement, boundary refinement, artifact correction,
  false positive removal). Role-based access: surgeon (full edit),
  radiologist (review + annotate), physicist (dosimetry export only),
  auditor (read-only with full trail visibility).

# (h) Instructions for use
instructions_for_use: >
  Input: DICOM CT volumes — axial acquisition, slice thickness
  <= 1.5mm (optimal 0.625-1.0mm), soft-tissue reconstruction kernel,
  contrast-enhanced preferred for soft-tissue metastases. Output:
  3D segmentation mask (DICOM SEG with vertebral labels T1-S5 +
  tumor regions), RT Structure Set for TPS import, 3D mesh (STL).
  Workflow: PACS export → SpineGuard AI queue → automated inference
  (median 90s per study) → clinician review → digital signature →
  export to treatment planning system. MANDATORY: board-certified
  physician must verify ALL segmentation boundaries before any
  clinical decision. AI output is ADVISORY ONLY — the treating
  physician retains full clinical responsibility. Developed per
  IEC 62304 (software lifecycle), IEC 82304-1 (health software),
  ISO 14971 (risk management), ISO 13485 (QMS), and IEC 62366-1
  (usability engineering).

# (*) Foreseeable misuse — Art. 9(2)(b)
potential_misuses: >
  NOT intended for: (1) standalone diagnosis or treatment decisions
  without qualified physician review — AI provides decision SUPPORT,
  not autonomous clinical action, (2) pediatric patients under 18
  years — training data excludes pediatric anatomy and growth plates,
  (3) non-CT imaging modalities (MRI, X-ray, PET-CT fusion) — model
  trained exclusively on CT Hounsfield unit distributions,
  (4) emergency triage or real-time intraoperative decisions without
  pre-operative CT baseline, (5) automated treatment plan generation
  without physicist/dosimetrist verification — segmentation accuracy
  alone does not guarantee treatment plan safety, (6) use in
  non-validated acquisition protocols — degraded performance with
  thick-slice CT (>2mm) or significant metal artifact from prior
  instrumentation, (7) connection to public internet or cloud
  services — system designed for air-gapped hospital DMZ operation
  only, (8) use as sole evidence for clinical trial endpoint
  assessment — requires independent central radiologist review
  per RECIST 1.1 criteria.
