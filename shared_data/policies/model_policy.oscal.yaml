assessment-plan:
  metadata:
    title: "EU AI Act Art. 15 — Model Performance (Spine Segmentation)"
    version: "2.0.0"
    oscal-version: "1.0.0"

  reviewed-controls:
    control-implementations:
      - description: "Article 15: Accuracy"
        implemented-requirements:
          - control-id: model-accuracy-global
            description: "Global Mean Dice > 0.85"
            props:
              - name: severity
                value: critical
              - name: metric_key
                value: global_dice
              - name: threshold
                value: "0.85"
              - name: operator
                value: gt
              - name: article
                value: "15"

          - control-id: data-leakage-check
            description: "Max Dice < 0.99 to exclude train-test leakage"
            props:
              - name: severity
                value: critical
              - name: metric_key
                value: max_single_dice
              - name: threshold
                value: "0.99"
              - name: operator
                value: lt
              - name: article
                value: "15"

      - description: "Article 15: Robustness"
        implemented-requirements:
          - control-id: robustness-scanner-bias
            description: "Min Dice > 0.85 across all scanner manufacturers"
            props:
              - name: severity
                value: high
              - name: metric_key
                value: min_scanner_dice
              - name: threshold
                value: "0.85"
              - name: operator
                value: gt
              - name: article
                value: "15"

          - control-id: robustness-lesion-type
            description: "Robustness across Lytic/Blastic clinical phenotypes > 0.80"
            props:
              - name: severity
                value: high
              - name: metric_key
                value: min_lesion_type_dice
              - name: threshold
                value: "0.80"
              - name: operator
                value: gt
              - name: article
                value: "15"

          - control-id: robustness-cancer-types
            description: "Min Dice > 0.80 for top 3 cancer types"
            props:
              - name: severity
                value: critical
              - name: metric_key
                value: min_cancer_dice
              - name: threshold
                value: "0.80"
              - name: operator
                value: gt
              - name: article
                value: "15"

      - description: "Article 15: Safety"
        implemented-requirements:
          - control-id: safety-small-volume
            description: "Safety on small lesions (bottom 25% volume) > 0.75 Dice"
            props:
              - name: severity
                value: critical
              - name: metric_key
                value: small_vol_dice
              - name: threshold
                value: "0.75"
              - name: operator
                value: gt
              - name: article
                value: "15"

          - control-id: safety-calibration
            description: "Positive correlation (r > 0.5) between Confidence and Dice"
            props:
              - name: severity
                value: medium
              - name: metric_key
                value: confidence_correlation
              - name: threshold
                value: "0.5"
              - name: operator
                value: gt
              - name: article
                value: "15"
